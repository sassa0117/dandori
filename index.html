<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>だんどり — フロー→AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#009ef3">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
  :root{
    --bg:#f4f6fa; --panel:#ffffff; --ink:#1f2733; --sub:#5b6675;
    --line:#d7deea; --accent:#009ef3; --accent2:#ff7f07;
    --node:#ffffff; --node-start:#e3f7ea; --node-end:#fde7e7; --node-branch:#fff4e0;
    --shadow:0 2px 8px rgba(31,39,51,.08);
  }
  *{box-sizing:border-box;-webkit-user-select:none;user-select:none}
  html,body{margin:0;height:100%;font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;color:var(--ink);background:var(--bg)}
  body{display:flex;flex-direction:column;overflow:hidden}

  header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:15px;margin:0 6px 0 0;font-weight:700;white-space:nowrap}
  header input.title{font-size:14px;padding:6px 9px;border:1px solid var(--line);border-radius:7px;flex:1;min-width:120px;max-width:340px}
  .spacer{flex:1}
  .btn{font-size:13px;padding:7px 12px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--ink);transition:.12s;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:#0086d4}
  .btn.icon{padding:7px 9px}
  .btn.warn:hover{border-color:#e0484b;color:#e0484b}

  main{flex:1;position:relative;overflow:hidden}
  #canvasWrap{position:absolute;inset:0;overflow:auto}
  #canvas{position:relative;width:4000px;height:3000px;
    background-image:radial-gradient(var(--line) 1px,transparent 1px);
    background-size:22px 22px}
  svg.edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
  svg.edges path.edge{stroke:#8a97aa;stroke-width:2;fill:none;pointer-events:stroke;cursor:pointer}
  svg.edges path.edge.hit{stroke:transparent;stroke-width:18}
  svg.edges path.edge.sel{stroke:var(--accent2)}
  svg.edges text.elabel{font-size:12px;fill:var(--sub);paint-order:stroke;stroke:#f4f6fa;stroke-width:4px;cursor:pointer;font-weight:600}

  .node{position:absolute;min-width:130px;max-width:240px;padding:9px 12px;border:1.5px solid var(--line);
    border-radius:11px;background:var(--node);box-shadow:var(--shadow);cursor:grab;font-size:14px;line-height:1.45}
  .node.dragging{cursor:grabbing;box-shadow:0 8px 20px rgba(31,39,51,.18)}
  .node .tag{font-size:10px;color:var(--sub);font-weight:700;letter-spacing:.04em;margin-bottom:2px}
  .node .label{white-space:pre-wrap;word-break:break-word;-webkit-user-select:text;user-select:text;min-height:1.4em}
  .node.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,158,243,.18),var(--shadow)}
  .node.t-start{background:var(--node-start);border-color:#9bd9b3}
  .node.t-end{background:var(--node-end);border-color:#e9a9aa}
  .node.t-branch{background:var(--node-branch);border-color:#f0c987}
  .node.connect-target{outline:3px dashed var(--accent2);outline-offset:2px}

  .handle{position:absolute;left:50%;bottom:-10px;transform:translateX(-50%);width:18px;height:18px;border-radius:50%;
    background:#fff;border:2px solid var(--accent);cursor:crosshair;display:flex;align-items:center;justify-content:center;opacity:.35;transition:opacity .12s}
  .node:hover .handle,.node.sel .handle{opacity:1}
  .handle::after{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .handle:hover{background:var(--accent);transform:translateX(-50%) scale(1.15)}
  .handle:hover::after{background:#fff}
  .node.connecting .handle{opacity:1;background:var(--accent2);border-color:var(--accent2)}
  .node.connecting .handle::after{background:#fff}

  #empty{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);text-align:center;color:var(--sub);
    pointer-events:none;font-size:14px;line-height:2}
  #empty .big{font-size:17px;color:var(--ink);font-weight:700;margin-bottom:6px}
  #empty kbd{background:#fff;border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-family:inherit;font-size:13px;box-shadow:0 1px 0 var(--line)}

  #fab{position:absolute;right:22px;bottom:22px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;
    border:none;font-size:30px;line-height:1;cursor:pointer;box-shadow:0 6px 18px rgba(0,158,243,.45);z-index:20}
  #fab:hover{background:#0086d4}
  #hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(31,39,51,.86);color:#fff;
    padding:7px 14px;border-radius:20px;font-size:12.5px;pointer-events:none;opacity:0;transition:.2s;white-space:nowrap;z-index:30}
  #hint.show{opacity:1}

  .overlay{position:absolute;inset:0;background:rgba(31,39,51,.35);display:none;align-items:center;justify-content:center;z-index:50}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:12px;width:min(720px,92vw);max-height:86vh;display:flex;flex-direction:column;box-shadow:0 14px 50px rgba(0,0,0,.3)}
  .modal header{border-bottom:1px solid var(--line);justify-content:space-between}
  .modal .body{padding:14px 16px;overflow:auto}
  .modal pre{background:#f7f9fc;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:12.5px;
    white-space:pre-wrap;word-break:break-word;-webkit-user-select:text;user-select:text;max-height:50vh;overflow:auto;margin:0}
  .tabs{display:flex;gap:6px;padding:10px 16px 0}
  .tab{padding:6px 12px;border:1px solid var(--line);border-bottom:none;border-radius:7px 7px 0 0;cursor:pointer;background:#f0f3f8;font-size:13px}
  .tab.active{background:#fff;color:var(--accent);font-weight:700}
</style>
</head>
<body>
<header>
  <h1>🧩 だんどり</h1>
  <input class="title" id="flowTitle" value="無題のワークフロー" />
  <div class="spacer"></div>
  <button class="btn primary" id="exportBtn">📋 AIに渡す</button>
  <button class="btn icon" id="saveBtn" title="ファイルに保存">💾</button>
  <button class="btn icon" id="loadBtn" title="ファイルを読込">📂</button>
  <button class="btn icon warn" id="clearBtn" title="全消去">🗑</button>
  <input type="file" id="fileInput" accept=".json" style="display:none">
</header>

<main>
  <div id="canvasWrap">
    <div id="canvas">
      <svg class="edges" id="edges"><defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#8a97aa"/></marker>
        <marker id="arrowSel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#ff7f07"/></marker>
      </defs></svg>
      <div id="empty">
        <div class="big">作業の流れを置いていくだけ</div>
        <div>どこでも <kbd>ダブルクリック</kbd> で手順を1つ追加</div>
        <div>箱の下の○を次の箱へドラッグして矢印でつなぐ</div>
        <div>種類（開始 / 分岐 / 終了）は自動で判定されます</div>
      </div>
    </div>
  </div>
  <button id="fab" title="手順を追加">＋</button>
  <div id="hint"></div>
</main>

<div class="overlay" id="exportOverlay">
  <div class="modal">
    <header>
      <h1 style="font-size:15px">AIに渡すテキスト</h1>
      <div style="display:flex;gap:8px">
        <button class="btn primary" id="copyBtn">コピー</button>
        <button class="btn" id="closeExport">閉じる</button>
      </div>
    </header>
    <div class="tabs">
      <div class="tab active" data-tab="md">手順テキスト（推奨）</div>
      <div class="tab" data-tab="json">JSON</div>
    </div>
    <div class="body"><pre id="exportText"></pre></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  const TAG = {start:"開始",end:"終了",branch:"分岐",task:"手順"};
  const LS_KEY = "flow-tool-state-v2";
  let state = { title:"無題のワークフロー", nodes:[], edges:[] };
  let seq = 1, sel = null, connectFrom = null;

  const canvas=document.getElementById('canvas'), wrap=document.getElementById('canvasWrap');
  const svg=document.getElementById('edges'), hintEl=document.getElementById('hint'), emptyEl=document.getElementById('empty');

  const uid=()=>'n'+(seq++)+'_'+Math.floor(Math.random()*1e4);
  const nodeById=id=>state.nodes.find(n=>n.id===id);
  function hint(t){ hintEl.textContent=t; hintEl.classList.add('show'); clearTimeout(hint._t); hint._t=setTimeout(()=>hintEl.classList.remove('show'),2200); }

  // ---- derive type from graph structure (user never picks) ----
  function degrees(){
    const ind={},outd={};
    state.nodes.forEach(n=>{ind[n.id]=0;outd[n.id]=0;});
    state.edges.forEach(e=>{ if(outd[e.from]!=null)outd[e.from]++; if(ind[e.to]!=null)ind[e.to]++; });
    return {ind,outd};
  }
  function typeOf(n,deg){
    const i=deg.ind[n.id]||0, o=deg.outd[n.id]||0;
    if(i===0&&o===0) return 'task';
    if(i===0) return 'start';
    if(o===0) return 'end';
    if(o>=2) return 'branch';
    return 'task';
  }

  // ---- add ----
  function addNodeAt(cx,cy,edit=true){
    const n={id:uid(),label:"",x:Math.round(cx-70),y:Math.round(cy-22)};
    state.nodes.push(n); renderAll(); selectNode(n.id);
    if(edit) setTimeout(()=>editNode(n.id),0);
    save();
  }
  function addNodeCentered(){ addNodeAt(wrap.scrollLeft+wrap.clientWidth/2, wrap.scrollTop+wrap.clientHeight/2); }

  function renderNode(n,type){
    let el=document.getElementById(n.id);
    if(!el){
      el=document.createElement('div'); el.id=n.id;
      el.innerHTML=`<div class="tag"></div><div class="label" contenteditable="false"></div><div class="handle" title="ドラッグで次へつなぐ"></div>`;
      canvas.appendChild(el); attachNodeEvents(el,n);
    }
    el.className='node t-'+type+(sel&&sel.kind==='node'&&sel.id===n.id?' sel':'');
    el.style.left=n.x+'px'; el.style.top=n.y+'px';
    el.querySelector('.tag').textContent=TAG[type];
    const lab=el.querySelector('.label');
    if(!lab.isContentEditable){ lab.textContent=n.label||''; lab.dataset.empty = n.label?'':'1'; if(!n.label) lab.style.color='var(--sub)', lab.textContent='（クリックで入力）'; else lab.style.color=''; }
  }
  function renderAll(){
    const deg=degrees();
    state.nodes.forEach(n=>renderNode(n,typeOf(n,deg)));
    drawEdges();
    emptyEl.style.display = state.nodes.length? 'none':'block';
  }

  function editNode(id){
    const el=document.getElementById(id); if(!el) return;
    const n=nodeById(id), lab=el.querySelector('.label');
    lab.style.color=''; lab.textContent=n.label||'';
    lab.contentEditable='true'; lab.focus();
    const r=document.createRange(); r.selectNodeContents(lab);
    const s=getSelection(); s.removeAllRanges(); s.addRange(r);
  }

  function attachNodeEvents(el,n){
    const lab=el.querySelector('.label'), handle=el.querySelector('.handle');
    let drag=null;
    el.addEventListener('pointerdown',e=>{
      if(e.target===handle) return;
      if(lab.isContentEditable) return;
      selectNode(n.id);
      drag={sx:e.clientX,sy:e.clientY,ox:n.x,oy:n.y,moved:false};
      el.classList.add('dragging'); el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove',e=>{
      if(!drag) return;
      const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
      if(Math.abs(dx)+Math.abs(dy)>3) drag.moved=true;
      n.x=Math.max(0,drag.ox+dx); n.y=Math.max(0,drag.oy+dy);
      el.style.left=n.x+'px'; el.style.top=n.y+'px'; drawEdges();
    });
    el.addEventListener('pointerup',()=>{ if(drag){ el.classList.remove('dragging'); if(drag.moved)save(); drag=null; } });
    el.addEventListener('dblclick',e=>{ if(e.target===handle)return; e.stopPropagation(); editNode(n.id); });
    lab.addEventListener('blur',()=>{
      lab.contentEditable='false'; n.label=lab.textContent.trim();
      renderAll(); save();
    });
    lab.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); lab.blur(); } if(e.key==='Escape'){ e.preventDefault(); lab.blur(); } });
    handle.addEventListener('pointerdown',e=>{ e.stopPropagation(); e.preventDefault(); startConnect(n.id); });
  }

  // ---- connecting ----
  let tempLine=null;
  function startConnect(fromId){
    connectFrom=fromId;
    document.getElementById(fromId).classList.add('connecting');
    document.querySelectorAll('.node').forEach(el=>{ if(el.id!==fromId) el.classList.add('connect-target'); });
    hint("つなぎ先のステップをクリック（Escで中止）");
    tempLine=document.createElementNS('http://www.w3.org/2000/svg','path');
    tempLine.setAttribute('stroke','#ff7f07'); tempLine.setAttribute('stroke-width','2');
    tempLine.setAttribute('stroke-dasharray','5 4'); tempLine.setAttribute('fill','none');
    svg.appendChild(tempLine);
    window.addEventListener('pointermove',moveTemp);
    canvas.addEventListener('pointerdown',pickTarget,true);
  }
  function moveTemp(e){
    if(!connectFrom)return;
    const a=anchor(nodeById(connectFrom),'out'), r=canvas.getBoundingClientRect();
    tempLine.setAttribute('d',path(a.x,a.y,e.clientX-r.left,e.clientY-r.top));
  }
  function pickTarget(e){
    const el=e.target.closest('.node');
    if(el&&el.id!==connectFrom){ e.stopPropagation(); e.preventDefault(); createEdge(connectFrom,el.id); }
    endConnect();
  }
  function endConnect(){
    if(tempLine){ tempLine.remove(); tempLine=null; }
    window.removeEventListener('pointermove',moveTemp);
    canvas.removeEventListener('pointerdown',pickTarget,true);
    if(connectFrom) document.getElementById(connectFrom)?.classList.remove('connecting');
    document.querySelectorAll('.connect-target').forEach(el=>el.classList.remove('connect-target'));
    connectFrom=null;
  }
  function createEdge(from,to){
    if(from===to) return;
    if(state.edges.some(e=>e.from===from&&e.to===to)){ hint("もうつながっています"); return; }
    const existing=state.edges.filter(e=>e.from===from);
    const ed={id:uid(),from,to,label:""};
    state.edges.push(ed);
    // becoming a branch (2+ outgoing) -> ask condition labels
    if(existing.length>=1){
      const tn=nodeById(to);
      const v=prompt(`分岐です。この矢印の条件は？（例: はい / 成功 / 在庫あり）\n→「${tn.label||'(無題)'}」`,"");
      if(v) ed.label=v.trim();
      // backfill the first sibling if it has no label yet
      const first=existing[0];
      if(first && !first.label){
        const fn=nodeById(first.to);
        const v2=prompt(`もう一方の矢印の条件は？\n→「${fn.label||'(無題)'}」`,"");
        if(v2) first.label=v2.trim();
      }
    }
    renderAll(); save();
  }

  // ---- edges ----
  function anchor(n,side){
    const el=document.getElementById(n.id), w=el?el.offsetWidth:140, h=el?el.offsetHeight:48;
    return side==='out' ? {x:n.x+w/2,y:n.y+h} : {x:n.x+w/2,y:n.y};
  }
  function path(x1,y1,x2,y2){ const dy=Math.max(40,Math.abs(y2-y1)*0.5); return `M ${x1},${y1} C ${x1},${y1+dy} ${x2},${y2-dy} ${x2},${y2}`; }
  function drawEdges(){
    [...svg.querySelectorAll('g.eg')].forEach(g=>g.remove());
    for(const ed of state.edges){
      const a=nodeById(ed.from), b=nodeById(ed.to); if(!a||!b)continue;
      const p1=anchor(a,'out'), p2=anchor(b,'in'), d=path(p1.x,p1.y,p2.x,p2.y);
      const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','eg');
      const hit=document.createElementNS('http://www.w3.org/2000/svg','path'); hit.setAttribute('class','edge hit'); hit.setAttribute('d',d);
      const isSel=sel&&sel.kind==='edge'&&sel.id===ed.id;
      const vis=document.createElementNS('http://www.w3.org/2000/svg','path');
      vis.setAttribute('class','edge'+(isSel?' sel':'')); vis.setAttribute('d',d);
      vis.setAttribute('marker-end',isSel?'url(#arrowSel)':'url(#arrow)');
      g.appendChild(vis); g.appendChild(hit);
      const pick=e=>{e.stopPropagation();selectEdge(ed.id);};
      hit.addEventListener('pointerdown',pick); vis.addEventListener('pointerdown',pick);
      hit.addEventListener('dblclick',e=>{e.stopPropagation();editEdgeLabel(ed);});
      if(ed.label){
        const t=document.createElementNS('http://www.w3.org/2000/svg','text');
        const sameX=Math.abs(p1.x-p2.x)<6;
        t.setAttribute('x',(p1.x+p2.x)/2 + (sameX?8:0)); t.setAttribute('y',(p1.y+p2.y)/2);
        t.setAttribute('class','elabel'); t.setAttribute('text-anchor',sameX?'start':'middle'); t.textContent=ed.label;
        t.addEventListener('pointerdown',pick); t.addEventListener('dblclick',e=>{e.stopPropagation();editEdgeLabel(ed);});
        g.appendChild(t);
      }
      svg.appendChild(g);
    }
  }
  function editEdgeLabel(ed){ const v=prompt("矢印の条件ラベル",ed.label||""); if(v!==null){ ed.label=v.trim(); drawEdges(); save(); } }

  // ---- selection ----
  function selectNode(id){ sel={kind:'node',id}; refreshSel(); }
  function selectEdge(id){ sel={kind:'edge',id}; refreshSel(); }
  function clearSel(){ sel=null; refreshSel(); }
  function refreshSel(){ const deg=degrees(); document.querySelectorAll('.node').forEach(el=>{ const n=nodeById(el.id); if(n) el.classList.toggle('sel',sel&&sel.kind==='node'&&sel.id===el.id); }); drawEdges(); }
  function deleteSel(){
    if(!sel)return;
    if(sel.kind==='node'){ state.nodes=state.nodes.filter(n=>n.id!==sel.id); state.edges=state.edges.filter(e=>e.from!==sel.id&&e.to!==sel.id); document.getElementById(sel.id)?.remove(); }
    else state.edges=state.edges.filter(e=>e.id!==sel.id);
    sel=null; renderAll(); save();
  }

  // ---- export ----
  function topoOrder(){
    const deg=degrees(), inc={...deg.ind};
    const queue=state.nodes.filter(n=>(deg.ind[n.id]||0)===0).sort((a,b)=>a.y-b.y||a.x-b.x);
    const seen=new Set(), order=[];
    while(queue.length){
      const n=queue.shift(); if(seen.has(n.id))continue; seen.add(n.id); order.push(n);
      state.edges.filter(e=>e.from===n.id).forEach(e=>{ inc[e.to]--; if(inc[e.to]<=0){ const t=nodeById(e.to); if(t&&!seen.has(t.id))queue.push(t);} });
    }
    state.nodes.forEach(n=>{ if(!seen.has(n.id))order.push(n); });
    return order;
  }
  const esc=s=>(s||'').replace(/\n/g,' ').replace(/"/g,"'");
  function lbl(n){ return (n.label&&n.label.trim())||'(無題)'; }
  function buildMermaid(order){
    const idx={}; order.forEach((n,i)=>idx[n.id]=i);
    const deg=degrees();
    const shape={start:["([","])"],end:["([","])"],branch:["{","}"],task:["[","]"]};
    let out="```mermaid\nflowchart TD\n";
    order.forEach((n,i)=>{ const s=shape[typeOf(n,deg)]; out+=`  N${i+1}${s[0]}"${esc(lbl(n))}"${s[1]}\n`; });
    state.edges.forEach(e=>{ const a=idx[e.from],b=idx[e.to]; if(a==null||b==null)return; out+=`  N${a+1} -->${e.label?`|"${esc(e.label)}"|`:''} N${b+1}\n`; });
    return out+"```";
  }
  function buildSteps(order){
    const deg=degrees(); let out="";
    order.forEach((n,i)=>{
      out+=`${i+1}. **${lbl(n).replace(/\n/g,' ')}**${typeOf(n,deg)==='branch'?' 〔分岐〕':''}\n`;
      const outs=state.edges.filter(e=>e.from===n.id);
      outs.forEach(e=>{ const t=nodeById(e.to); if(!t)return; const c=e.label?`「${e.label}」なら `:''; out+=`   - → ${c}「${lbl(t).replace(/\n/g,' ')}」へ\n`; });
      if(!outs.length && typeOf(n,deg)!=='end') out+=`   - （次なし）\n`;
    });
    return out;
  }
  function buildMarkdown(){
    if(!state.nodes.length) return "（まだ手順がありません）";
    const order=topoOrder();
    return `# ワークフロー: ${state.title}\n\n以下の手順で作業してください。図と手順リストは同じ内容です。\n\n## フロー図\n${buildMermaid(order)}\n\n## 手順\n${buildSteps(order)}\n---\n_「→」が次の工程、ラベルは分岐の条件です。_`;
  }
  function buildJSON(){
    const deg=degrees();
    return JSON.stringify({title:state.title,steps:topoOrder().map(n=>({label:lbl(n),type:typeOf(n,deg),next:state.edges.filter(e=>e.from===n.id).map(e=>({to:lbl(nodeById(e.to)),when:e.label||undefined}))})) },null,2);
  }
  let exportTab='md';
  function showExport(){ document.getElementById('exportText').textContent= exportTab==='md'?buildMarkdown():buildJSON(); document.getElementById('exportOverlay').classList.add('show'); }

  // ---- persistence ----
  function save(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(e){} }
  function load(obj){
    state=obj; seq=1;
    document.getElementById('flowTitle').value=state.title||"無題のワークフロー";
    state.nodes.forEach(n=>{ const m=/^n(\d+)/.exec(n.id); if(m)seq=Math.max(seq,+m[1]+1); if(n.type)delete n.type; });
    canvas.querySelectorAll('.node').forEach(el=>el.remove());
    renderAll();
  }
  function loadLocal(){ try{ const s=localStorage.getItem(LS_KEY); if(s){ load(JSON.parse(s)); return true; } }catch(e){} return false; }

  // ---- wiring ----
  document.getElementById('flowTitle').addEventListener('input',e=>{state.title=e.target.value;save();});
  document.getElementById('exportBtn').addEventListener('click',showExport);
  document.getElementById('fab').addEventListener('click',addNodeCentered);
  document.getElementById('closeExport').addEventListener('click',()=>document.getElementById('exportOverlay').classList.remove('show'));
  document.getElementById('exportOverlay').addEventListener('pointerdown',e=>{ if(e.target.id==='exportOverlay')e.currentTarget.classList.remove('show'); });
  document.getElementById('copyBtn').addEventListener('click',()=>{ const t=document.getElementById('exportText').textContent; navigator.clipboard.writeText(t).then(()=>hint("コピーしました")).catch(()=>hint("コピー失敗：枠内を手動選択してください")); });
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); exportTab=t.dataset.tab; showExport(); }));
  document.getElementById('saveBtn').addEventListener('click',()=>{ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(state.title||'flow').replace(/[\\/:*?"<>|]/g,'_')+'.json'; a.click(); });
  document.getElementById('loadBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ load(JSON.parse(r.result)); save(); hint("読み込みました"); }catch(err){ hint("ファイルが不正です"); } }; r.readAsText(f); e.target.value=''; });
  document.getElementById('clearBtn').addEventListener('click',()=>{ if(confirm("全て消去しますか？")){ state={title:state.title,nodes:[],edges:[]}; canvas.querySelectorAll('.node').forEach(el=>el.remove()); sel=null; renderAll(); save(); } });

  canvas.addEventListener('dblclick',e=>{ if(e.target!==canvas&&e.target!==svg&&e.target!==emptyEl&&!emptyEl.contains(e.target))return; const r=canvas.getBoundingClientRect(); addNodeAt(e.clientX-r.left,e.clientY-r.top); });
  canvas.addEventListener('pointerdown',e=>{ if(e.target===canvas||e.target===svg) clearSel(); });
  window.addEventListener('keydown',e=>{
    if(e.key==='Escape'){ if(connectFrom)endConnect(); else clearSel(); document.getElementById('exportOverlay').classList.remove('show'); }
    const editing=document.activeElement&&document.activeElement.isContentEditable;
    if((e.key==='Delete'||e.key==='Backspace')&&!editing&&sel){ e.preventDefault(); deleteSel(); }
  });

  // ---- boot ----
  if(!loadLocal()){ state={title:"無題のワークフロー",nodes:[],edges:[]}; renderAll(); }
  wrap.scrollLeft=4000/2-wrap.clientWidth/2; wrap.scrollTop=3000/2-wrap.clientHeight/2;
})();
</script>
<script>
  if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
</script>
</body>
</html>
